<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
  <link rel="icon" href="https://discord.com/assets/favicon.ico">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #313338;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #2b2d31;
      border-radius: 12px;
      padding: 2.5rem;
      max-width: 440px;
      width: 90vw;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #3f4147;
      border-top-color: #5865f2;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 1.25rem;
    }
    h2 { color: #f2f3f5; font-size: 1.2rem; margin-bottom: 0.3rem; }
    p { color: #949ba4; font-size: 0.9rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <h2>Redirecting to Discord...</h2>
    <p>You should be redirected automatically.</p>
  </div>
  <script>
    window.location.href = '/auth';
  </script>
</body>
</html>
